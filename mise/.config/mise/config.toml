#:schema https://mise.jdx.dev/schema/mise.json

[tools]
# AI tools
claude-code = "latest"
codex = "latest"
opencode = "latest"
# Misc
bun = "latest"

[env]
CLAUDE_CONFIG_DIR = "{{ env.XDG_CONFIG_HOME }}/claude"
CODEX_HOME = "{{ env.XDG_CONFIG_HOME }}/codex"
OPENCODE_CONFIG_DIR = "{{ env.XDG_CONFIG_HOME }}/opencode"
# PI_CODING_AGENT_DIR = "{{ env.XDG_CONFIG_HOME }}/pi"

[settings]
idiomatic_version_file_enable_tools = []
